sources:
  dataplex-source:
    kind: "dataplex"
    project: ${DATAPLEX_PROJECT}

tools:
  search_entries:
    kind: dataplex-search-entries
    source: dataplex-source
    description: |
      Finds all entries in Dataplex Catalog (e.g. tables, views, models). 

      Steps to follow when this tool is called:
      1. Convert the user query into a valid Dataplex search query by calling get_search_syntax tool. Make sure that the query aligns with the search syntax rules.
      2. Pass the constructed query to the `search_entries` tool along with other parameters and retrieve the results.

      The output will look like this:

      {
        "results": [
          {
            object (SearchEntriesResult)
          }
        ],
        "totalSize": integer,
        "nextPageToken": string,
        "unreachable": [
          string
        ]
      }

      WHERE you have to keep note of results, totalSize and nextPageToken AND
      
      WHERE

      SearchEntriesResult has the following format:
      {
        "dataplexEntry": {
          object (Entry)
        }
      }

      WHERE

      you have to refer to description of dataplex-lookup-entry for details about the fields in the Entry object.

      Show the search entries results in a **nested ordered list** format to the user. Remember all the fields but respond with only the following fields:
      - Name: display_name of the entry
      - Project: project_id of the entry
      - Location: location of the entry

      Format the output in nested ordered list in the following way:
      
      1. customer_data
            project: my_project1
            location: us
      2. user_data
            project: test_project7
            location: us-central1

      These are invalid format of outputs for the user:
      Output:
      1. test345 (has extra fields)
            project: test_project2
            location: us
            type: table
      2. test123 (not nested)
      project: test_project3
      location: us-central1
      3. test (not nested)  project: test_project4 location: us-central1

      When the user chooses the entry, these are possible next queries from the user:
      1. Show me the details of the first entry. -> Use lookup_entry with the resource name of the first entry.
      2. What is the type of the third entry? -> Use lookup_entry with the resource name of the third entry and present the type to the user. 

      If there are multiple entries found, you should present the list of entries to the user and ask them to choose one.
      If there is only one entry found, you can ask the user if they want to see the details of that entry or if they want to search for another entry.
      If the response from the tool is empty then it means that there were no matching entries found. Notify the user about this and ask them to provide a more specific query.
    parameters:
      - name: query
        type: string
        description: |
          The query against which entries should be matched. Use get_search_syntax to construct the query.

          ## Simple search
          In its simplest form, a Dataplex Universal Catalog search query consists of a single predicate. Such a predicate can match several pieces of metadata:

          - A substring of a name, display name, or description of a resource
          - A substring of the type of a resource
          - A substring of a column name (or nested column name) in the schema of a resource
          - A substring of a project ID
          - A string from an overview description

          For example, the predicate foo matches the following resources:
          - Resource with the name foo.bar
          - Resource with the display name Foo Bar
          - Resource with the description This is the foo script
          - Resource with the exact type foo
          - Column foo_bar in the schema of a resource
          - Nested column foo_bar in the schema of a resource
          - Project prod-foo-bar
          - Resource with an overview containing the word foo


          ## Qualified predicates
          You can qualify a predicate by prefixing it with a key that restricts the matching to a specific piece of metadata:
          - An equal sign (=) restricts the search to an exact match.
          - A colon (:) after the key matches the predicate to either a substring or a token within the value in the search results.

          Tokenization splits the stream of text into a series of tokens, with each token usually corresponding to a single word. For example:
          - name:foo selects resources with names that contain the foo substring, like foo1 and barfoo.
          - description:foo selects resources with the foo token in the description, like bar and foo.
          - location=foo matches resources in a specified location with foo as the location name.

          The predicate keys type, system, location, and orgid support only the exact match (=) qualifier, not the substring qualifier (:). For example, type=foo or orgid=number.

          Dataplex Universal Catalog supports the following qualifiers:
          - "name:x" - Matches x as a substring of the resource ID.
          - "displayname:x" - Match x as a substring of the resource display name.
          - "column:x" - Matches x as a substring of the column name (or nested column name) in the schema of the resource.
          - "description:x" - Matches x as a token in the resource description.
          - "label:bar" - Matches BigQuery resources that have a label (with some value) and the label key has bar as a substring.
          - "label=bar" - Matches BigQuery resources that have a label (with some value) and the label key equals bar as a string.
          - "label:bar:x" - Matches x as a substring in the value of a label with key bar attached to a BigQuery resource.
          - "label=foo:bar" - Matches BigQuery resources where the key equals foo and the key value equals bar.
          - "label.foo=bar" - Matches BigQuery resources where the key equals foo and the key value equals bar.
          - "label.foo" - Matches BigQuery resources that have a label whose key equals foo as a string.
          - "type=TYPE" - Matches resources of a specific entry type or its type alias.
          - "projectid:bar" - Matches resources within Google Cloud projects that match bar as a substring in the ID.
          - "parent:x" - Matches x as a substring of the hierarchical path of a resource. The parent path is a fully_qualified_name of the parent resource.
          - "orgid=number" - Matches resources within a Google Cloud organization with the exact ID value of number.
          - "system=SYSTEM" - Matches resources from a specified system. For example, system=bigquery matches BigQuery resources.
          - "location=LOCATION" - Matches resources in a specified location with an exact name. For example, location=us-central1 matches assets hosted in Iowa. 
                                  BigQuery Omni assets support this qualifier by using the BigQuery Omni location name. For example, location=aws-us-east-1 matches BigQuery Omni assets in Northern Virginia.
          - "createtime" - 
              Finds resources that were created within, before, or after a given date or time. For example:
              "createtime:2019-01-01" matches resources created on 2019-01-01.
              "createtime<2019-02" matches resources created before 2019-02-01T00:00:00.
              "createtime>2019-02" matches resources created after 2019-02-01T00:00:00.
              Timestamp format: YYYY-MM-DDThh:mm:ss
              All timestamps must be in GMT; time zones are not supported. Partial timestamps, hyphen (-) date separators, and slash (/) date separators are supported.
              For example:
              - 2010-10-22T05:36:24
              - 2010-10-22T05:36
              - 2010-10-22T05
              - 2010-10-22
              - 2010-10
              - 2010
              - 2010/10/22

          - "updatetime" - Finds resources that were updated within, before, or after a given date or time. For example:
              "updatetime:2019-01-01" matches resources updated on 2019-01-01.
              "updatetime<2019-02" matches resources updated before 2019-02-01T00:00:00.
              "updatetime>2019-02" matches resources updated after 2019-02-01T00:00:00.
              Timestamp format: YYYY-MM-DDThh:mm:ss
              All timestamps must be in GMT; time zones are not supported. Partial timestamps, hyphen (-) date separators, and slash (/) date separators are supported.
              For example:
              - 2010-10-22T05:36:24
              - 2010-10-22T05:36
              - 2010-10-22T05
              - 2010-10-22
              - 2010-10
              - 2010
              - 2010/10/22

          - "fully_qualified_name:x" - Matches x as a substring of fully_qualified_name.
          - "fully_qualified_name=x" - Matches x as fully_qualified_name.

          ## Logical operators
          A query can consist of several predicates with logical operators. If you don't specify an operator, logical AND is implied. For example, foo bar returns resources that match both predicate foo and predicate bar.
          Logical AND and logical OR are supported. For example, foo OR bar.
          You can negate a predicate with a - (hyphen) or NOT prefix. For example, -name:foo returns resources with names that don't match the predicate foo.
          Logical operators aren't case-sensitive. For example, both or and OR are acceptable.

      - name: page_size
        type: integer
        description: "Maximum number of entries to return in the response"
        default: 10
      - name: page_token
        type: string
        description: "Token to retrieve the next page of results"
        default: ""
      - name: order_by
        type: string
        description: "Specifies the ordering of results. Supported values are: relevance, last_modified_timestamp, last_modified_timestamp asc"
        default: "relevance"

  lookup_entry:
    kind: dataplex-lookup-entry
    source: dataplex-source
    description: |
      Get details about a specific entry in Catalog.

      The output contains an instance of the Entry and will look like this:

      {
        "name": string,
        "entryType": string,
        "createTime": string,
        "updateTime": string,
        "aspects": {
          string: {
            object (Aspect)
          },
          ...
        },
        "parentEntry": string,
        "fullyQualifiedName": string,
        "entrySource": {
          object (EntrySource)
        }
      }

      Whenever this tool is called, you have to remember all the fields but return only the following fields:
      - resource_name - resource name of the entry
      - display_name - human readable name of the entry
      - description - description of the entry
      - type - type of the entry (e.g. table, view, model)
      - project_id - project where the entry is stored
      - location - location where the entry is stored

      This is valid example of an Entry object:
      ```
      {
        "resource_name": "projects/test-project/locations/us/entryGroups/@bigquery/entries/bigquery.googleapis.com/projects/test-project/datasets/test-dataset/tables/test-table1",
        "display_name": "test-table1",
        "description": "This is a test table",
        "type": "table",
        "project_id": "test-project",
        "location": "us"
      }
      ```
      You should present the details to the user in a human-readable format like this:
      ```
      Display Name: test-table1
      Description: This is a test table
      Resource Name: projects/test-project/locations/us/entryGroups/@bigquery/entries/bigquery.googleapis.com/projects/test-project/datasets/test-dataset/tables/test-table1
      Type: table
      Project ID: test-project
      Location: us
      ```
      ```
      Display Name: user-instance2
      Description: This is a test instance
      Resource Name: projects/test-project/locations/us/entryGroups/@bigtableadmin/entries/bigtableadmin.googleapis.com/projects/my-project-123/instances/my-instance-abc
      Type: instance
      Project ID: test-project
      Location: us-central1
      ```
      ```
      Display Name: test-table32
      Description: This is a test table from an external 3P data source.
      Resource Name: projects/test-project/locations/us-central1/entryGroups/external-3p-entry-group/entries/test-table1
      Type: table
      Project ID: test-project
      Location: us
      ```
      If the response from the tool is empty then it means that there were no matching entries found. Notify the user that the entry was not found.

      Users can have follow up questions on any field of the Entry object. Suggest the user to ask some possible questions.
    parameters:
      - name: name
        type: string
        description: "The project to which the request should be attributed in the following form: projects/{project}/locations/{location}."
      - name: entry
        type: string
        description: "The resource name of the Entry: projects/{project}/locations/{location}/entryGroups/{entryGroup}/entries/{entry}."
      - name: aspect_types
        type: array
        items:
          name: aspect_types_array_item
          type: string
          description: "String array of aspect types to be returned. If not specified, all aspects will be returned. This is only applicable for CUSTOM view."
        description: "Limits the aspects returned to the provided aspect types. It only works for CUSTOM view."
        default: []
      - name: view
        type: string
        description: |
          It is an enum type argument for controlling which parts of aspects are to be returned for an entry. Passed as string "enum" corresponds to the following values:
          - ENTRY_VIEW_UNSPECIFIED (0) : Unspecified EntryView. Defaults to FULL.
          - BASIC (1) : Returns entry only, without aspects.
          - FULL (2) : Returns all required aspects as well as the keys of all non-required aspects.
          - CUSTOM (3) : Returns aspects matching custom fields in GetEntryRequest/LookupEntryRequest. If the number of aspects exceeds 100, the first 100 will be returned.
          - ALL (4) : Returns all aspects. If the number of aspects exceeds 100, the first 100 will be returned.

          Sample prompts:
          - Show basic details about users table. view = "1"
          - Show full details about users table. view = "2"
        default: "2"

  get_search_syntax:
    kind: dataplex-get-search-syntax
    source: dataplex-source
    description: |
      This tool is a helper tool used to construct a proper query to be passed as "query" argument in search_entries tool if user wants to search some entry based on a particular aspect type.

      Aspect types are of two types:
      1. First party aspect types - These are the aspect types that are built-in to Dataplex.
      2. Third party aspect types - These are the aspect types that are created by the users.

      ## To construct a query for third party aspect types follow the below steps to construct a query:

      1. This tool will return a list of all third party aspect types available to the user. First find which aspect types are relevant to the user prompt.
      2. If the list does not contain the aspect type that user might be interested in, ask the user for more specific query.
      3. If list contains multiple aspect types that user might be interested in, ask the user to choose one of the aspect types from the list.
      4. Each aspect type will have following format:
          {
            "dataplexEntry": {
              "name": "projects/{project_number_entry}/locations/{location}/entryGroups/{entry_group}/entries/{aspect_type_id}_aspectType",
              "entryType": "projects/{project_number_entry_type}/locations/global/entryTypes/aspecttype",
              "createTime": "{create_time_entry}",
              "updateTime": "{update_time_entry}",
              "entrySource": {
                "resource": "projects/{project_number_aspect_type}/locations/{location}/aspectTypes/{aspect_type_id}",
                "system": "{SYSTEM}",
                "displayName": "{display_name_aspect_type}",
                "description": "{description_aspect_type}",
                "createTime": "{create_time_aspect_type}",
                "updateTime": "{update_time_aspect_type}",
                "location": "{location_aspect_type}"
              },
              "entryTypeInfo": {}
            },
            "snippets": {}
          },
      5. From the above results, remember the following fields:
        - aspect_type_id - human readable name of the entry
        - location - location where the entry is stored
        - project_number_aspect_type - project number where the aspect type is stored. use the following mapping to convert project_number to project_id:
          - 398032818995 -> anujjjw-project
          - 497382724143 -> patryk-test-project
      6. Use following rules to create a query and pass to search_entries tool.
        - "aspect:projectId.location.aspect_type_id" - Matches projectId.location.aspect_type_id as substring.
        - "aspect=projectId.location.aspect_type_id" - Matched projectId.location.aspect_type_id as exact match.
        - "aspect:{projectId.location.aspect_type_id.FIELD_NAME}{OPERATOR}{value}" - Searches for aspect field values. Matches projectId.location.aspect_type_id.FIELD_NAME as a substring.

            The list of supported {OPERATOR}s depends on the type of field in the aspect, as follows:
            - String: = (exact match) and : (substring)
            - All number types: =, :, <, >, <=, >=, =>, =<
            - Enum: =
            - Datetime: same as for numbers, but the values to compare are treated as datetimes instead of numbers
            - Boolean: =
            
            Only top-level fields of the aspect are searchable. For example, all of the following queries match entries where the value of the is-enrolled field in the employee-info aspect type is true. Other entries that match on the substring are also returned.
            - aspect:example-project.us-central1.employee-info.is-enrolled=true
            - aspect:example-project.us-central1.employee=true
            - aspect:employee=true

            Example:-
            You can use following filters
            - test-projects.global.data-governance.has-pii={true,false}
            - test-projects.global.data-governance.encrypted-data-asset={true,false}

      ## To construct a query for first party aspect types follow the below steps to construct a query: "aspect:dataplex-types.global.<first-party-aspect-name>"

      Here is a list of all first party aspects type names - analytics-hub, analytics-hub-exchange, analytics-hub-listing, aspect-type-spect, bigquery-connection, bigquery-data-policy, bigquery-dataset, bigquery-model, bigquery-policy, bigquery-routine, bigquery-row-level-security-policy, bigquery-table, bigquery-view, cloud-bigtable-instance, cloud-bigtable-table, cloud-pubsub-topic-specific-parameters, cloud-spanner-database, cloud-spanner-instance, cloud-spanner-table, cloud-spanner-view, cloud-sql-database, cloud-sql-instance, cloud-sql-schema, cloud-sql-table, cloud-sql-view, contacts, data-quality-scorecard, dataform-code-asset, dataform-repository, dataform-workspace, dataproc-metastore-database, dataproc-metastore-service, dataproc-metastore-table, entry-group-aspect, entry-type-aspect, external-connection, generic-entry, glossary-aspect, glossary-category-aspect, glossary-term-aspect, overview, schema, sensitive-data-protection-job-result, sensitive-data-protection-profile, sql-access, storage-bucket, storage-folder, usage, vertex-ai-dataset, vertex-ai-feature-group, vertex-ai-feature-online-store, vertex-ai-feature-view, vertex-ai-model-version

toolsets:
  dataplex-tools:
    - search_entries
    - lookup_entry
    - get_search_syntax
